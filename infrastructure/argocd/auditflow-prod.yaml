apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auditflow-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/auditflow
    path: infrastructure/k8s/overlays/prod
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: auditflow-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
